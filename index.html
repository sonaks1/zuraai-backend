<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZuraAI | Your Professional Wellness Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8E7AB5;
            --primary-light: #B784B7;
            --bg-gradient: linear-gradient(135deg, #F3F0FF 0%, #E5E1FF 100%);
            --chat-bg: #FFFFFF;
            --user-msg: #8E7AB5;
            --ai-msg: #F3F4F6;
            --text-dark: #2D3748;
            --text-light: #718096;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--chat-bg);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Header */
        header {
            padding: 24px;
            background: white;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(142, 122, 181, 0.3);
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .voice-toggle {
            background: #F3F4F6;
            color: var(--text-light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .voice-toggle.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(142, 122, 181, 0.3);
        }

        .voice-toggle:hover {
            transform: scale(1.05);
        }

        .header-info p {
            font-size: 13px;
            color: #10B981;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-info p::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            display: inline-block;
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: radial-gradient(#8E7AB5 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-color: #FAFAFA;
            opacity: 1;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai {
            align-self: flex-start;
            background: var(--ai-msg);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(142, 122, 181, 0.2);
        }

        /* Typing Indicator */
        .typing {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
            display: none;
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #F0F0F0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #E2E8F0;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
            transition: all 0.2s;
            background: #F8FAFC;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(142, 122, 181, 0.1);
        }

        .icon-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 12px rgba(142, 122, 181, 0.3);
        }

        .icon-btn:hover {
            background: #7A66A0;
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn.recording {
            background: #EF4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

        @media (max-width: 480px) {
            #app-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-left">
                <div class="avatar">Z</div>
                <div class="header-info">
                    <h1>ZuraAI</h1>
                </div>
            </div>
            <button id="voice-enable-toggle" class="voice-toggle" title="Toggle Zura's Voice">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="speaker-on"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
        </header>

        <div id="chat-window">
            <div class="message ai">Hello! I'm ZuraAI, your professional wellness assistant. How can I support your well-being today?</div>
        </div>

        <div id="typing-indicator" class="typing" style="padding: 0 24px;">Zura is typing...</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Message Zura..." autocomplete="off">
            <button id="voice-btn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button id="send-btn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        // Use local backend by default for testing, fallback to production
        const API_BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
            ? "http://localhost:8000" 
            : "https://zuraai-backend-production.up.railway.app";
            
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const voiceEnableToggle = document.getElementById('voice-enable-toggle');
        const typingIndicator = document.getElementById('typing-indicator');

        let token = localStorage.getItem("token");
        
        // --- Visitor ID Logic ---
        let visitor_id = localStorage.getItem("visitor_id");
        if (!visitor_id) {
            visitor_id = crypto.randomUUID();
            localStorage.setItem("visitor_id", visitor_id);
        }

        let recognition;
        let isRecording = false;
        let voiceEnabled = false;

        // Voice Enable Toggle Logic
        voiceEnableToggle.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            voiceEnableToggle.classList.toggle('active', voiceEnabled);
            if (!voiceEnabled) {
                // Stop any current audio if disabled
                const currentAudio = document.querySelector('audio');
                if (currentAudio) currentAudio.pause();
            }
        });

        // Voice Recognition Setup
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                userInput.value = finalTranscript || interimTranscript;
            };

            recognition.onend = () => {
                stopRecording();
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopRecording();
            };
        } else {
            voiceBtn.style.display = 'none';
            console.warn("Speech recognition not supported in this browser.");
        }

        function toggleVoice() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            voiceBtn.classList.add('recording');
            userInput.placeholder = "Listening...";
            userInput.value = "";
            userInput.readOnly = true; // Disable manual typing while recording
            recognition.start();
        }

        function stopRecording() {
            isRecording = false;
            voiceBtn.classList.remove('recording');
            userInput.placeholder = "Message Zura...";
            userInput.readOnly = false;
            recognition.stop();
            // Removed automatic sending - user will now send manually
        }

        voiceBtn.addEventListener('click', toggleVoice);

        // Simulated Login (Optional - can be bypassed by guest mode)
        async function ensureAuth() {
            if (token) return true;
            return false; // Bypassing for guest mode test
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to UI
            appendMessage('user', message);
            userInput.value = '';
            
            // Show typing
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch(`${API_BASE}/chat/`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ 
                        message: message,
                        visitor_id: visitor_id,
                        voice_enabled: voiceEnabled
                    })
                });

                if (response.status === 401) {
                    typingIndicator.style.display = 'none';
                    appendMessage('ai', "Authentication error. Please refresh or try again.");
                    return;
                }

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (data.reply) {
                    appendMessage('ai', data.reply);
                    
                    // Handle Voice Playback
                    if (data.audio_base64 && voiceEnabled) {
                        const audio = new Audio(`data:audio/mp3;base64,${data.audio_base64}`);
                        audio.play().catch(e => console.error("Audio Playback Error:", e));
                    }
                } else {
                    appendMessage('ai', "I'm here, but I didn't quite catch that. Could you say it again?");
                }
            } catch (e) {
                typingIndicator.style.display = 'none';
                appendMessage('ai', "I'm offline for a moment. Please check your connection!");
                console.error("Chat error:", e);
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize Auth
        ensureAuth();
    </script>
</body>
</html>
